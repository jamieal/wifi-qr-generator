<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connected!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1.5rem;
        }
        .card {
            text-align: center;
            max-width: 400px;
        }
        .check {
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 3rem;
            animation: pop 0.4s ease-out;
        }
        @keyframes pop {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }
        p {
            font-size: 1.1rem;
            opacity: 0.9;
            line-height: 1.5;
        }
        .details {
            margin-top: 1.5rem;
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            font-size: 0.9rem;
            text-align: left;
        }
        .details .row {
            display: flex;
            justify-content: space-between;
            padding: 0.3rem 0;
        }
        .details .label { opacity: 0.7; }
        .offline {
            display: none;
        }
        .offline h1 { color: #ff6b6b; }
    </style>
</head>
<body>
    <div class="card" id="online">
        <div class="check">&#10003;</div>
        <h1>You're Connected!</h1>
        <p>Your device is online and connected to WiFi. You're all set.</p>
        <div class="details" id="details"></div>
    </div>

    <div class="card offline" id="offline-card">
        <div class="check" style="background: rgba(255,107,107,0.3);">&#10007;</div>
        <h1>Not Connected</h1>
        <p>It looks like you're not online yet. Try scanning the WiFi QR code again, or check that you entered the correct password.</p>
    </div>

    <script>
        // If this page loaded, they're almost certainly online.
        // But let's do a quick connectivity check to be sure.
        const onlineCard = document.getElementById('online');
        const offlineCard = document.getElementById('offline-card');
        const details = document.getElementById('details');

        if (navigator.onLine) {
            onlineCard.style.display = 'block';
            offlineCard.style.display = 'none';

            // Show timestamp
            const now = new Date();
            details.innerHTML = `
                <div class="row"><span class="label">Status</span><span>Online</span></div>
                <div class="row"><span class="label">Verified at</span><span>${now.toLocaleTimeString()}</span></div>
            `;
        } else {
            onlineCard.style.display = 'none';
            offlineCard.style.display = 'block';
        }

        // Listen for changes
        window.addEventListener('online', () => location.reload());
    </script>
</body>
</html>
